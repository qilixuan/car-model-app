services:
  - type: web
    name: car-model-backend
    runtime: python
    pythonVersion: "3.11"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    directory: backend
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./car_model.db
